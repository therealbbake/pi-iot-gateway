<div class="content-grid">
  <div class="card">
    <h2>Temperature Trend</h2>
    <oj-chart
      id="temperatureChart"
      type="line"
      data="[[chartSeries]]"
      animation-on-display="auto"
      animation-on-data-change="auto"
      hover-behavior="dim"
    ></oj-chart>
    <p>
      Last reading:
      <span data-bind="text: lastReadingText"></span>
    </p>
    <p>
      IoT send status:
      <span
        data-bind="text: lastStatusText, css: lastStatusCss"
      ></span>
    </p>
  </div>
  <div class="card">
    <h2>IoT Domain Configuration</h2>
    <oj-form-layout max-columns="1">
      <oj-select-single
        label-hint="Protocol"
        data="[[protocolOptions]]"
        value="{{formState.protocol}}"
      ></oj-select-single>
      <oj-input-text
        label-hint="Domain"
        value="{{formState.domain}}"
      ></oj-input-text>
      <oj-input-text
        label-hint="Region"
        value="{{formState.region}}"
      ></oj-input-text>
      <oj-input-text
        label-hint="Resource / Topic"
        value="{{formState.resource}}"
      ></oj-input-text>
      <oj-input-text
        label-hint="Device ID"
        value="{{formState.deviceId}}"
      ></oj-input-text>
      <oj-input-number
        label-hint="Sampling Interval (sec)"
        value="{{formState.samplingInterval}}"
        min="5"
        max="3600"
      ></oj-input-number>
      <oj-input-text
        label-hint="Username"
        value="{{formState.username}}"
      ></oj-input-text>
      <oj-input-password
        label-hint="Password"
        value="{{formState.password}}"
      ></oj-input-password>
    </oj-form-layout>
    <div class="config-actions">
      <oj-button on-oj-action="[[saveConfig]]">Save</oj-button>
      <oj-button on-oj-action="[[testConnection]]">Test Connection</oj-button>
    </div>
    <p data-bind="text: actionMessage, css: messageCss"></p>
  </div>
  <div class="card">
    <h2>Recent Readings</h2>
    <oj-table
      data="[[tableDataProvider]]"
      columns="[[tableColumns]]"
      display="grid"
    ></oj-table>
  </div>
</div>
