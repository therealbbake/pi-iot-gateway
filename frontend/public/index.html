<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi IoT Gateway UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body { padding: 20px; }
        .section { margin-bottom: 40px; }
        .sensor-card { margin-bottom: 20px; }
        #sensorEditModal { z-index: 1060 !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Pi IoT Gateway</h1>
            <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#configModal">
                <i class="bi bi-gear"></i> Settings
            </button>
        </div>
        
        <div class="section">
            <h2>Current Readings</h2>
            <button id="refresh-readings" class="btn btn-primary mb-3">Refresh</button>
            <button id="manage-sensors" class="btn btn-secondary mb-3 ms-2" data-bs-toggle="modal" data-bs-target="#sensorsModal">Manage Sensors</button>
            <div id="sensors-container" class="row"></div>
        </div>

        <div class="section">
            <h2>Light Control</h2>
            <button id="light-on" class="btn btn-success me-2">Turn On</button>
            <button id="light-off" class="btn btn-danger">Turn Off</button>
            <div id="light-message" class="mt-3"></div>
        </div>
    </div>

    <!-- Config Modal -->
    <div class="modal fade" id="configModal" tabindex="-1" aria-labelledby="configModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="configModalLabel">Configuration</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="config-form">
                        <div class="accordion" id="configAccordion">
                            <div class="accordion-item">
                                <h2 class="accordion-header" id="headingDevices">
                                    <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDevices" aria-expanded="true" aria-controls="collapseDevices">
                                        Connected Devices
                                    </button>
                                </h2>
                                <div id="collapseDevices" class="accordion-collapse collapse show" aria-labelledby="headingDevices">
                                    <div class="accordion-body">
                                        <div class="mb-3">
                                            <label for="sampling_interval_sec" class="form-label">Sampling Interval (sec)</label>
                                            <input type="number" class="form-control" id="sampling_interval_sec" min="5" max="3600">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Sensors</label>
                                            <ul id="sensors-list" class="list-group mb-2"></ul>
                                        </div>
                                        <div class="mb-3">
                                            <label for="light_gpio_pin" class="form-label">Light GPIO Pin</label>
                                            <input type="number" class="form-control" id="light_gpio_pin" min="1" max="40">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="accordion-item">
                                <h2 class="accordion-header" id="headingDomain">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDomain" aria-expanded="false" aria-controls="collapseDomain">
                                        IoT Domain
                                    </button>
                                </h2>
                                <div id="collapseDomain" class="accordion-collapse collapse" aria-labelledby="headingDomain">
                                    <div class="accordion-body">
                                        <div class="mb-3">
                                            <label for="domain" class="form-label">Domain</label>
                                            <input type="text" class="form-control" id="domain">
                                        </div>
                                        <div class="mb-3">
                                            <label for="region" class="form-label">Region</label>
                                            <input type="text" class="form-control" id="region">
                                        </div>
                                        <div class="mb-3">
                                            <label for="resource" class="form-label">Resource</label>
                                            <input type="text" class="form-control" id="resource">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="accordion-item">
                                <h2 class="accordion-header" id="headingProtocol">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseProtocol" aria-expanded="false" aria-controls="collapseProtocol">
                                        Protocol
                                    </button>
                                </h2>
                                <div id="collapseProtocol" class="accordion-collapse collapse" aria-labelledby="headingProtocol">
                                    <div class="accordion-body">
                                        <div class="mb-3">
                                            <label for="protocol" class="form-label">Protocol</label>
                                            <select class="form-select" id="protocol">
                                                <option value="http">HTTP</option>
                                                <option value="mqtt">MQTT</option>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label for="device_id" class="form-label">Device ID</label>
                                            <input type="text" class="form-control" id="device_id">
                                        </div>
                                        <div class="mb-3 form-check">
                                            <input type="checkbox" class="form-check-input" id="publish_enabled">
                                            <label class="form-check-label" for="publish_enabled">Enable Publishing</label>
                                        </div>
                                        <h4>Authentication</h4>
                                        <div class="mb-3">
                                            <label for="external_key" class="form-label">External Key</label>
                                            <input type="text" class="form-control" id="external_key">
                                        </div>
                                        <div class="mb-3">
                                            <label for="secret" class="form-label">Secret</label>
                                            <input type="password" class="form-control" id="secret">
                                        </div>
                                        <div id="mqtt-subsection" style="display: none;">
                                            <h4>MQTT Settings</h4>
                                            <div class="mb-3">
                                                <label for="mqtt_host" class="form-label">MQTT Host</label>
                                                <input type="text" class="form-control" id="mqtt_host">
                                            </div>
                                            <div class="mb-3">
                                                <label for="mqtt_port" class="form-label">MQTT Port</label>
                                                <input type="number" class="form-control" id="mqtt_port" min="1" max="65535">
                                            </div>
                                            <div class="mb-3 form-check">
                                                <input type="checkbox" class="form-check-input" id="mqtt_use_tls">
                                                <label class="form-check-label" for="mqtt_use_tls">Use TLS</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success mt-3">Update Config</button>
                        <button type="button" id="test-connection" class="btn btn-info ms-2 mt-3">Test Connection</button>
                        <button type="button" id="reboot-pi" class="btn btn-warning ms-2 mt-3">Reboot Pi</button>
                        <button type="button" id="update-service" class="btn btn-primary ms-2 mt-3">Update Service</button>
                    </form>
                    <div id="config-message" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sensor Details Modal -->
    <div class="modal fade" id="sensorDetailsModal" tabindex="-1" aria-labelledby="sensorDetailsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sensorDetailsModalLabel">Sensor Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" style="max-height: 80vh; overflow-y: auto;">
                    <table class="table table-striped" id="sensor-details-table">
                        <thead>
                            <tr>
                                <th>Recorded At</th>
                                <th>Temp C</th>
                                <th>Temp F</th>
                                <th>Status</th>
                                <th>Error</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Sensor Edit Modal -->
    <div class="modal fade" id="sensorEditModal" tabindex="-1" aria-labelledby="sensorEditModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sensorEditModalLabel">Edit Sensor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="sensor-form">
                        <div class="mb-3">
                            <label for="sensor-id" class="form-label">Sensor ID</label>
                            <input type="text" class="form-control" id="sensor-id">
                        </div>
                        <div class="mb-3">
                            <label for="sensor-provider" class="form-label">Provider</label>
                            <select class="form-select" id="sensor-provider">
                                <option value="w1">W1</option>
                                <option value="mock">Mock</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-sensor">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sensors Management Modal -->
    <div class="modal fade" id="sensorsModal" tabindex="-1" aria-labelledby="sensorsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sensorsModalLabel">Manage Sensors</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul id="main-sensors-list" class="list-group mb-2"></ul>
                    <button type="button" class="btn btn-secondary" id="main-add-sensor">Add Sensor</button>
                    <button type="button" class="btn btn-secondary ms-2" id="main-discover-sensors">Discover Sensors</button>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="save-sensors">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script>
        const API_BASE = '/api';

        let app = { sensors: [], mainSensors: [], currentEditIndex: -1, currentModal: 'config' };
        
        async function fetchReadings() {
            try {
                const response = await fetch(`${API_BASE}/readings?limit=100`);
                const data = await response.json();
                const grouped = groupBySensor(data.readings);
                const container = document.getElementById('sensors-container');
                container.innerHTML = '';
                Object.keys(grouped).forEach(sensorId => {
                    const readings = grouped[sensorId];
                    const card = createSensorCard(sensorId, readings.slice(0, 3), readings);
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching readings:', error);
            }
        }

        function groupBySensor(readings) {
            return readings.reduce((acc, reading) => {
                const id = reading.sensor_id || 'default';
                if (!acc[id]) acc[id] = [];
                acc[id].push(reading);
                return acc;
            }, {});
        }

        function createSensorCard(sensorId, last3, all) {
            const card = document.createElement('div');
            card.className = 'col-md-4 sensor-card';
            card.innerHTML = `
                <div class="card">
                    <div class="card-header">Sensor: ${sensorId}</div>
                    <div class="card-body">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Temp C</th>
                                    <th>Temp F</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${last3.map(r => `
                                    <tr>
                                        <td>${new Date(r.recorded_at).toLocaleString()}</td>
                                        <td>${r.temperature_c}</td>
                                        <td>${r.temperature_f}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <button class="btn btn-info btn-sm view-more" data-sensor="${sensorId}">View More</button>
                    </div>
                </div>
            `;
            card.querySelector('.view-more').addEventListener('click', () => showSensorDetails(sensorId, all));
            return card;
        }

        function showSensorDetails(sensorId, readings) {
            const tbody = document.querySelector('#sensor-details-table tbody');
            tbody.innerHTML = '';
            readings.forEach(r => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${new Date(r.recorded_at).toLocaleString()}</td>
                    <td>${r.temperature_c}</td>
                    <td>${r.temperature_f}</td>
                    <td>${r.transport_status}</td>
                    <td>${r.transport_error || ''}</td>
                `;
                tbody.appendChild(row);
            });
            document.getElementById('sensorDetailsModalLabel').textContent = `Sensor: ${sensorId} - All Readings`;
            new bootstrap.Modal(document.getElementById('sensorDetailsModal')).show();
        }

        async function fetchConfig() {
            try {
                const response = await fetch(`${API_BASE}/config`);
                const data = await response.json();
                document.getElementById('protocol').value = data.transport.protocol;
                document.getElementById('domain').value = data.transport.domain;
                document.getElementById('region').value = data.transport.region;
                document.getElementById('resource').value = data.transport.resource;
                document.getElementById('device_id').value = data.transport.device_id;
                document.getElementById('sampling_interval_sec').value = data.transport.sampling_interval_sec;
                document.getElementById('publish_enabled').checked = data.transport.publish_enabled;
                document.getElementById('light_gpio_pin').value = data.transport.light_gpio_pin;
                document.getElementById('mqtt_host').value = data.transport.mqtt_host || '';
                document.getElementById('mqtt_port').value = data.transport.mqtt_port;
                document.getElementById('mqtt_use_tls').checked = data.transport.mqtt_use_tls;
                toggleMqttSubsection(data.transport.protocol === 'mqtt');
                toggleMqttFields(data.transport.mqtt_use_tls);
                
                app.sensors = data.sensors || [];
                app.mainSensors = [...app.sensors]; // Copy for main page management
                renderSensorsList();
                renderMainSensorsList();
                // Secrets are not fetched for security
            } catch (error) {
                console.error('Error fetching config:', error);
            }
        }

        async function updateConfig(event) {
            event.preventDefault();
            const payload = {
                transport: {
                    protocol: document.getElementById('protocol').value,
                    domain: document.getElementById('domain').value,
                    region: document.getElementById('region').value,
                    resource: document.getElementById('resource').value,
                    device_id: document.getElementById('device_id').value,
                    sampling_interval_sec: parseInt(document.getElementById('sampling_interval_sec').value),
                    publish_enabled: document.getElementById('publish_enabled').checked,
                    light_gpio_pin: parseInt(document.getElementById('light_gpio_pin').value),
                    mqtt_host: document.getElementById('mqtt_host').value || null,
                    mqtt_port: parseInt(document.getElementById('mqtt_port').value),
                    mqtt_use_tls: document.getElementById('mqtt_use_tls').checked
                },
                secrets: {}
            };

            const external_key = document.getElementById('external_key').value;
            const secret = document.getElementById('secret').value;
            if (external_key) payload.secrets.external_key = external_key;
            if (secret) payload.secrets.secret = secret;

            try {
                const response = await fetch(`${API_BASE}/config`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    document.getElementById('config-message').innerHTML = '<div class="alert alert-success">Config updated successfully</div>';
                    await fetchConfig(); // Refresh form
                } else {
                    const error = await response.text();
                    document.getElementById('config-message').innerHTML = `<div class="alert alert-danger">Error: ${error}</div>`;
                }
            } catch (error) {
                document.getElementById('config-message').innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        }


        function renderSensorsList() {
            const list = document.getElementById('sensors-list');
            list.innerHTML = '';
            app.sensors.forEach((sensor, index) => {
                const item = document.createElement('li');
                item.className = 'list-group-item d-flex justify-content-between align-items-center';
                item.innerHTML = `
                    <span>${sensor.id} (${sensor.provider})</span>
                `;
                list.appendChild(item);
            });
        }

        function renderMainSensorsList() {
            const list = document.getElementById('main-sensors-list');
            list.innerHTML = '';
            app.mainSensors.forEach((sensor, index) => {
                const item = document.createElement('li');
                item.className = 'list-group-item d-flex justify-content-between align-items-center';
                item.innerHTML = `
                    <span>${sensor.id} (${sensor.provider})</span>
                    <div>
                        <button class="btn btn-sm btn-primary main-edit-sensor me-1" data-index="${index}">Edit</button>
                        <button class="btn btn-sm btn-danger main-remove-sensor" data-index="${index}">Remove</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function openSensorModal(index, modalType = 'config') {
            app.currentModal = modalType;
            const sensorsArray = modalType === 'config' ? app.sensors : app.mainSensors;
            const modal = new bootstrap.Modal(document.getElementById('sensorEditModal'));
            const title = document.getElementById('sensorEditModalLabel');
            const idInput = document.getElementById('sensor-id');
            const providerSelect = document.getElementById('sensor-provider');
            app.currentEditIndex = index;
            if (index >= 0) {
                const sensor = sensorsArray[index];
                title.textContent = 'Edit Sensor';
                idInput.value = sensor.id;
                providerSelect.value = sensor.provider;
            } else {
                title.textContent = 'Add Sensor';
                idInput.value = '';
                providerSelect.value = 'w1';
            }
            modal.show();
        }

        function saveSensor() {
            const id = document.getElementById('sensor-id').value;
            const provider = document.getElementById('sensor-provider').value;
            if (!id) return; // Validation
            const sensorsArray = app.currentModal === 'config' ? app.sensors : app.mainSensors;
            if (app.currentEditIndex >= 0) {
                sensorsArray[app.currentEditIndex] = { id, provider };
            } else {
                sensorsArray.push({ id, provider });
            }
            if (app.currentModal === 'config') {
                renderSensorsList();
            } else {
                renderMainSensorsList();
            }
            bootstrap.Modal.getInstance(document.getElementById('sensorEditModal')).hide();
        }

        async function discoverAndAddSensors(modalType = 'config') {
            try {
                const response = await fetch(`${API_BASE}/sensors/discover`);
                const discovered = await response.json();
                const sensorsArray = modalType === 'config' ? app.sensors : app.mainSensors;
                const existingIds = sensorsArray.map(s => s.id);
                discovered.forEach(id => {
                    if (!existingIds.includes(id)) {
                        sensorsArray.push({ id, provider: 'w1' });
                    }
                });
                if (modalType === 'config') {
                    renderSensorsList();
                } else {
                    renderMainSensorsList();
                }
            } catch (error) {
                console.error('Error discovering sensors:', error);
            }
        }

        async function saveMainSensors() {
            const payload = {
                sensors: app.mainSensors
            };
            try {
                const response = await fetch(`${API_BASE}/config/sensors`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    await fetchConfig();
                    alert('Sensors updated successfully');
                    bootstrap.Modal.getInstance(document.getElementById('sensorsModal')).hide();
                } else {
                    alert('Error updating sensors');
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        async function fetchSensors() {
            try {
                const response = await fetch(`${API_BASE}/config`);
                const data = await response.json();
                app.mainSensors = data.sensors || [];
                renderMainSensorsList();
            } catch (error) {
                console.error('Error fetching sensors:', error);
            }
        }

        async function testConnection() {
            const protocolOverride = document.getElementById('protocol').value; // Or prompt, but using current for simplicity
            try {
                const response = await fetch(`${API_BASE}/test-connection`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ protocol_override: protocolOverride })
                });
                const data = await response.json();
                document.getElementById('config-message').innerHTML = `<div class="alert alert-${data.status === 'ok' ? 'success' : 'danger'}">${data.message || data.status}</div>`;
            } catch (error) {
                document.getElementById('config-message').innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        }

        async function toggleLight(action) {
            console.log(`Attempting to toggle light: ${action}`);
            try {
                const response = await fetch(`${API_BASE}/light/${action}`, { method: 'POST' });
                console.log(`Fetch response status: ${response.status}`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('light-message').innerHTML = `<div class="alert alert-success">${data.message}</div>`;
                } else {
                    const error = await response.text();
                    document.getElementById('light-message').innerHTML = `<div class="alert alert-danger">Error: ${error}</div>`;
                }
            } catch (error) {
                document.getElementById('light-message').innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchReadings();
            fetchSensors();
            fetchConfig();
            document.getElementById('refresh-readings').addEventListener('click', fetchReadings);
            document.getElementById('config-form').addEventListener('submit', updateConfig);
            document.getElementById('test-connection').addEventListener('click', testConnection);
            document.getElementById('light-on').addEventListener('click', () => toggleLight('on'));
            document.getElementById('light-off').addEventListener('click', () => toggleLight('off'));
            document.getElementById('save-sensor').addEventListener('click', saveSensor);
            document.getElementById('main-sensors-list').addEventListener('click', (e) => {
                if (e.target.classList.contains('main-edit-sensor')) {
                    const index = parseInt(e.target.dataset.index);
                    openSensorModal(index, 'main');
                } else if (e.target.classList.contains('main-remove-sensor')) {
                    const index = parseInt(e.target.dataset.index);
                    app.mainSensors.splice(index, 1);
                    renderMainSensorsList();
                }
            });
            document.getElementById('main-add-sensor').addEventListener('click', () => openSensorModal(-1, 'main'));
            document.getElementById('main-discover-sensors').addEventListener('click', () => discoverAndAddSensors('main'));
            document.getElementById('save-sensors').addEventListener('click', saveMainSensors);

            // Handle protocol change for MQTT subsection
            document.getElementById('protocol').addEventListener('change', (e) => {
                toggleMqttSubsection(e.target.value === 'mqtt');
            });

            // Handle Use TLS checkbox to disable host and port
            const useTlsCheckbox = document.getElementById('mqtt_use_tls');
            const mqttHostInput = document.getElementById('mqtt_host');
            const mqttPortInput = document.getElementById('mqtt_port');

            function toggleMqttFields(disabled) {
                mqttHostInput.disabled = disabled;
                mqttPortInput.disabled = disabled;
            }

            useTlsCheckbox.addEventListener('change', (e) => {
                toggleMqttFields(e.target.checked);
            });
            document.getElementById('reboot-pi').addEventListener('click', async () => {
                if (confirm('Are you sure you want to reboot the Pi?')) {
                    try {
                        const response = await fetch(`${API_BASE}/reboot`, { method: 'POST' });
                        if (response.ok) {
                            alert('Reboot initiated');
                        } else {
                            alert('Error rebooting');
                        }
                    } catch (error) {
                        alert(`Error: ${error.message}`);
                    }
                }
            });
            document.getElementById('update-service').addEventListener('click', async () => {
                if (confirm('Are you sure you want to update and restart the service?')) {
                    try {
                        const response = await fetch(`${API_BASE}/update`, { method: 'POST' });
                        if (response.ok) {
                            alert('Update initiated');
                        } else {
                            alert('Error updating');
                        }
                    } catch (error) {
                        alert(`Error: ${error.message}`);
                    }
                }
            });
        });

        function toggleMqttSubsection(show) {
            document.getElementById('mqtt-subsection').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
